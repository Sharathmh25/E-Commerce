<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MyStore | Login</title>
    <style>
        /* Remove default spacing */
        * { margin: 0; padding: 0; }

        /* Page font and background */
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; }

        /* -------- HEADER WITH SIDE-BY-SIDE NAVIGATION -------- */
        header { background-color: #222; color: white; padding: 20px 5%; }
        
        /* Left-aligned brand heading block */
        .logo { display: inline-block; width: 45%; text-align: left; font-size: 22px; font-weight: bold; vertical-align: middle; }
        
        /* Right-aligned navigation links block */
        nav { display: inline-block; width: 50%; text-align: right; vertical-align: middle; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 15px; }
        nav a:hover { color: orange; }

        /* -------- LOGIN CARD -------- */
        /* Centers the card on the page */
        main { display: flex; justify-content: center; align-items: center; min-height: 80vh; }

        /* The white box that holds the form */
        .card { background-color: white; border: 1px solid #ddd; border-radius: 8px; padding: 30px; width: 350px; text-align: center; }
        .card h2 { margin-bottom: 6px; }
        .card p { color: gray; font-size: 14px; margin-bottom: 20px; }

        /* Each label + input group */
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
        .form-group input:focus { border-color: #007bff; outline: none; }

        /* Submit button */
        button { width: 100%; padding: 11px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 15px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        button:hover { background-color: #0056b3; }

        /* Register link below the button */
        .register-link { margin-top: 15px; font-size: 13px; color: gray; }
        .register-link a { color: #007bff; text-decoration: none; }

        .error-terminal {
            background-color: #fee2e2;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 18px;
            text-align: left;
        }

        .error-message {
            color: #b91c1c;
            font-size: 13px;
            margin-bottom: 6px;
        }

        /* -------- FOOTER -------- */
        footer { background-color: #222; color: #aaa; text-align: center; padding: 15px; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MyStore</div>
        <nav>
            <a href="/">Home</a>
            <a href="/Collections/">Products</a>
            <a href="/contact/">Contact</a>
            <a href="/logout/">Logout</a>
        </nav>
    </header>

    <main>
        <div class="card">
            <h2>Welcome Back</h2>
            <p>Sign in to access your account</p>

            <form method="POST">
                {% csrf_token %}

                {% if messages %}
                    <div class="error-terminal">
                        {% for message in messages %}
                            <p class="error-message">⚠️ {{ message }}</p>
                        {% endfor %}
                    </div>
                {% endif %}

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit">Sign In</button>
            </form>

            <p class="register-link">
                Don't have an account? <a href="/register/">Register</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MyStore. Made by a Frontend Developer.</p>
    </footer>

</body>
</html>
